<svg width="760" height="460" viewBox="0 0 760 460" xmlns="http://www.w3.org/2000/svg" font-family="Segoe UI, Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#555555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="760" height="460" fill="#ffffff"/>
  <text x="380" y="30" text-anchor="middle" font-size="19" font-weight="600" fill="#1a1a1a">Demo Blog API — Monitoring Data Flow</text>

  <!-- Client -->
  <rect x="40" y="70" width="200" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
  <text x="140" y="98" text-anchor="middle" font-size="14" font-weight="600" fill="#2C2C2A">Client request</text>
  <text x="140" y="116" text-anchor="middle" font-size="11.5" fill="#444441">GET /api/posts, /comments</text>
  <line x1="240" y1="98" x2="290" y2="98" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Blog API server -->
  <rect x="290" y="60" width="280" height="180" rx="14" fill="#E1F5EE" stroke="#0F6E56"/>
  <text x="310" y="85" font-size="14" font-weight="600" fill="#04342C">Blog API (Express, :3002)</text>

  <rect x="315" y="100" width="230" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56"/>
  <text x="430" y="121" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">Route handler</text>
  <text x="430" y="138" text-anchor="middle" font-size="11" fill="#085041">simulated latency, ~3% injected 503s</text>

  <line x1="430" y1="150" x2="430" y2="175" stroke="#0F6E56" stroke-width="1.3" marker-end="url(#arrow)"/>

  <rect x="315" y="175" width="230" height="50" rx="8" fill="#9FE1CB" stroke="#0F6E56"/>
  <text x="430" y="196" text-anchor="middle" font-size="13" font-weight="600" fill="#04342C">res.on('finish') hook</text>
  <text x="430" y="213" text-anchor="middle" font-size="11" fill="#085041">capture status + latency after response sent</text>

  <line x1="570" y1="98" x2="610" y2="98" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="590" y="88" font-size="11" fill="#555" text-anchor="middle">response</text>

  <rect x="610" y="70" width="120" height="56" rx="8" fill="#F1EFE8" stroke="#5F5E5A"/>
  <text x="670" y="98" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Client</text>
  <text x="670" y="116" text-anchor="middle" font-size="11" fill="#444441">gets reply</text>

  <!-- async fire and forget -->
  <line x1="430" y1="225" x2="430" y2="280" stroke="#854F0B" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="445" y="255" font-size="11.5" fill="#854F0B">setImmediate (non-blocking)</text>

  <rect x="240" y="280" width="380" height="64" rx="10" fill="#FAEEDA" stroke="#854F0B"/>
  <text x="430" y="305" text-anchor="middle" font-size="13.5" font-weight="600" fill="#412402">createMonitoringMiddleware</text>
  <text x="430" y="324" text-anchor="middle" font-size="11.5" fill="#633806">builds hit payload, axios.post with x-api-key header</text>

  <line x1="430" y1="344" x2="430" y2="380" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="230" y="380" width="400" height="60" rx="10" fill="#B5D4F4" stroke="#185FA5"/>
  <text x="430" y="406" text-anchor="middle" font-size="14" font-weight="600" fill="#042C53">APIMS server — POST /api/hit</text>
  <text x="430" y="425" text-anchor="middle" font-size="11.5" fill="#0C447C">serviceName: "blog-api"</text>

  <text x="380" y="455" text-anchor="middle" font-size="11" fill="#888880">If MONITORING_API_KEY is unset, the middleware becomes a no-op — the API works without it.</text>
</svg>
